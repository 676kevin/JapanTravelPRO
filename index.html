<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Japan Travel PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e83b4c">
  <style>
    body { font-family: sans-serif; margin: 0; background: #f9f9f9; }
    header { background: #e83b4c; color: white; padding: 1em; text-align: center; }
    .card { background: white; margin: 1em; padding: 1em; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .buttons { display: flex; flex-wrap: wrap; justify-content: space-around; margin: 1em; }
    .buttons button { flex: 1 1 30%; margin: 0.5em; padding: 1em; border: none; border-radius: 6px; background: #e83b4c; color: white; font-size: 1em; }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker registered"));
    }
  </script>
</head>
<body>
  <header>
    <h1>Japan Travel PRO</h1>
    <p>東京・5天4夜・4人同行</p>
  </header>

  <div class="card">
    <h2>行程資訊</h2>
    <p>日期：2026/4/20</p>
    <p>住宿：新宿王子飯店</p>
    <p>費用：NT$55,000</p>
    <p>同伴：小明・小花・阿偉・小玲</p>
  </div>

  <div class="buttons">
    <button onclick="alert('探索功能尚未完成')">探索</button>
    <button onclick="alert('行程規劃功能尚未完成')">行程</button>
    <button onclick="alert('AI 建議功能尚未完成')">AI</button>
    <button onclick="alert('地圖功能尚未完成')">地圖</button>
    <button onclick="alert('聊天功能尚未完成')">聊天</button>
    <button onclick="alert('費用分攤功能尚未完成')">費用</button>
  </div>
</body>
</html>
